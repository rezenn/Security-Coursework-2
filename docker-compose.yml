version: "3.9"

services:
  # ── MongoDB (local dev only — use Atlas in production) ──────────────────────
  mongo:
    image: mongo:7.0-jammy
    container_name: gyankosh-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gyankosh
    networks:
      - gyankosh-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API server ────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gyankosh-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      # Uncomment to use the local Docker Mongo instead of Atlas:
      # MONGO_URI: mongodb://mongo:27017/gyankosh
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - server_logs:/app/logs
    networks:
      - gyankosh-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/health',(r)=>process.exit(r.statusCode===200?0:1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Next.js client ────────────────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked in at BUILD time and used by the BROWSER,
  # so they must point to a URL the browser can reach (localhost:5000),
  # not the internal Docker service name (server:5000).
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: gyankosh-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - gyankosh-net
    environment:
      NODE_ENV: production

volumes:
  mongo_data:
  server_logs:

networks:
  gyankosh-net:
    driver: bridge
