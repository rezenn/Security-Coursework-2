name: GyanKosh CI — Security & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Server: typecheck + lint + audit ──────────────────────────────────────
  server-checks:
    name: Server — TypeCheck + Lint + Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint (SAST — static analysis)
        run: npx eslint src --ext .ts --max-warnings 0 || true

      - name: npm audit (dependency vulnerability scan)
        run: npm audit --audit-level=critical --omit=dev  
        continue-on-error: false

      - name: Build TypeScript
        run: npm run build

  # ── Client: typecheck + lint + audit ──────────────────────────────────────
  client-checks:
    name: Client — TypeCheck + Lint + Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint || true

      - name: npm audit (dependency vulnerability scan)
        run: npm audit --audit-level=high --omit=dev 
        continue-on-error: false

  # ── Secret scanning ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build check ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [server-checks, client-checks]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: gyankosh-server:ci

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: gyankosh-client:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:5000
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=test
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
